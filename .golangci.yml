linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - misspell
    - godot
    - exhaustive
    - wrapcheck

linters-settings:
  goimports:
    local-prefixes: github.com/golchanskiy23/dns-manager
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - wrapcheck
    - source: "status\\.Error\\("
      linters:
        - wrapcheck
    # flag.FlagSet.Parse — ошибка из stdlib, передаётся напрямую
    - source: "fs\\.Parse\\("
      linters:
        - wrapcheck
